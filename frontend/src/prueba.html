<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Subida</title>
</head>
<body>
    <h2>Laboratorio de SARA: Subida de Audiovisual</h2>
    <form action="http://localhost:3000/api/audiovisual" method="POST" enctype="multipart/form-data">
        
        <label>Número de Animal:</label>
        <input type="number" name="numero_animal" value="1" required><br><br>
        
        <label>Archivo (Imagen o Video):</label>
        <input type="file" name="archivo" required><br><br>
        
        <button type="submit">Enviar a Cloudinary</button>
    </form>
</body>
</html>
